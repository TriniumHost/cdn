<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TriniumHost</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d1117;
      color: #c9d1d9;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #161b22;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
      max-width: 400px;
      width: 90%;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
      transition: 0.3s;
      cursor: pointer;
    }

    .logo:hover {
      transform: scale(1.05);
      filter: drop-shadow(0 0 10px #58a6ff);
    }

    h1 {
      margin-bottom: 10px;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
      transition: 0.2s;
    }

    a:hover {
      color: #79c0ff;
      text-shadow: 0 0 8px #58a6ff;
    }

    p {
      color: #8b949e;
      font-size: 16px;
    }

    .highlight {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <a href="https://triniumhost.com" target="_blank" rel="noopener noreferrer">
      <img 
        src="https://cdn.triniumhost.com/file_000000000540620aa1167bae6d417047.png" 
        alt="Logo TriniumHost" 
        class="logo"
      >
    </a>

    <h1>
      <a href="https://triniumhost.com" target="_blank" rel="noopener noreferrer">
        TriniumHost
      </a>
    </h1>

    <p>
      Este sistema pertence ao ecossistema da 
      <a href="https://triniumhost.com" target="_blank" rel="noopener noreferrer" class="highlight">
        TriniumHost
      </a>.
    </p>

  </div>
</body>
</html>
